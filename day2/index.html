<!doctype html>
<html>


    <head>

        <meta charset="utf-8">
        <title>clock</title>
    </head>

    <body>

        <div class="clock">

            <div class ="clock-face">

                <div class="hand hour-hand"></div>
                <div class="hand min-hand"></div>
                <div class="hand sec-hand"></div>
            </div>
        </div>

        <style>

            html {

                background:#018ded url(https://unsplash.it/1500/1000?image=881&blur=50);
                background-size: cover;
                font-family: 'helvetica neue';
                text-align: center;
                font-size: 10px;

            }

            body {

                font-size: 2rem;
                display:flex;
                flex: 1;
                min-height: 100vh;
                align-items: center;

            }

            .clock {

                width: 30rem;
                height: 30rem;
                border:20px solid white;
                border-radius: 50%;
                margin: 50px auto;
                position: relative;
                padding: 2rem;
                box-shadow: 0 0 0px 4px rgba(0,0,0,0.1),
                inset 0 0 0 3px #efefef,
                inset 0 0 10px black,
                0 0 10px rgba(0,0,0,0.2);
            }

            .clock-face {

                position: relative;
                width:100%;
                height: 100%;
                transform: translateY(-3px);

            }

            .hand {

                width: 50%;
                height: 6px;
                background-color: black;
                position: absolute;
                top: 50%;   
                transform-origin: 100%;
                transform: rotate(90deg);
                transition: transform 0.05s;
                transition-timing-function: cubic-bezier(0.1,2.7,0.58,1);

            }


        </style>


        <script>

            const secHand = document.querySelector('.sec-hand');
            const hourHand = document.querySelector('.hour-hand');
            const minHand = document.querySelector('.min-hand');


            function setDate() {
                const now = new Date();
                const seconds = now.getSeconds();
                const minutes = now.getMinutes();
                const hours = now.getHours();

                const secDeg = ((seconds/60)*360) + 90;
                const minDeg = ((minutes/60)*360) + 90;

                const hourDeg = ((hours % 12) / 12) * 360 + (minutes / 60) * 30 + 90;

                if (seconds === 0) {
                    secHand.style.transition = "none";
                } else {
                    secHand.style.transition = "";
                }

                secHand.style.transform = `rotate(${secDeg}deg)`;
                minHand.style.transform = `rotate(${minDeg}deg)`;
                hourHand.style.transform = `rotate(${hourDeg}deg)`;

                console.log(seconds);

            }

            setInterval(setDate, 1000);

        </script>
    </body>

</html>
