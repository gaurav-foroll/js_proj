<!doctype html>

<html lang="en">
    <head>
        
        <title>
            Js drum kit
        </title>
        <link rel="stylesheet" href="./style.css">

    </head>

    <body>
        <div>

            <div class="keys">
            <div data-key="87" class="key">
                <kbd>w</kbd>
                <span class ="sound">1up</span>
            </div>
        </div>

        <div class="keys">
            <div data-key="65" class="key">
                <kbd>a</kbd>
                <span class ="sound">coin</span>
            </div>
        </div>
        
        <div class="keys">
            <div data-key="83" class="key">
                <kbd>s</kbd>
                <span class ="sound">lvl_clear</span>
            </div>
        </div>

        <div class="keys">
            <div data-key="68" class="key">
                <kbd>d</kbd>
                <span class ="sound">world_clear</span>
            </div>
        </div>

            
        </div>

        

        <audio data-key="87" src="sound/smb3_sound_effects_1_up.wav"></audio>
        <audio data-key="65" src="sound/smb3_sound_effects_coin.wav"></audio>
        <audio data-key="83" src="sound/smb_stage_clear.wav"></audio>
        <audio data-key="68" src="sound/smb_world_clear.wav"></audio>
        
        <script>
            window.addEventListener('keydown', (e)=>{
                console.log(e);
                
                const audio = document.querySelector(`audio[data-key = "${e.keyCode}"]`);
                if(!audio) return ;
                audio.currentTime = 0;
                audio.play();
            });

        </script>
    
    </body>


</html>
