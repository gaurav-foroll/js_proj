<!-- ajax type ahead and fetch -->

<!doctype html>

<html lang="en">

<head>
    <meta charset="utf-8">

    <title>type ahead</title>

    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="https://fav.farm/🔥">

</head>


<body>


    <form class="search-form">
        <input type="text" class="search" placeholder="city or state">
        <ul class="suggestions">
            <li>filter for city </li>
            <li>or a state</li>
        </ul>
    </form>


    <script>

        const searchInput = document.querySelector(".search");
        const suggestion = document.querySelector(".suggestions");

        const endpoint = "https://gist.githubusercontent.com/Miserlou/c5cd8364bf9b2420bb29/raw/2bf258763cdddd704f8ffd3ea9a3e81d25e2c6f6/cities.json";

        const cities = [];

        fetch(endpoint).then(blob => blob.json()).then(data => cities.push(...data));

        function findMatches(wordToMatch, cities) {

            const search = wordToMatch.toLowerCase();

            return cities.filter(place => {

                if (!wordToMatch) return [];
                return place.city.toLowerCase().includes(search) || place.state.toLowerCase().includes(search);

            });

        }

        function numberWithCommas(x) {
            return x.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        }

        function escapeRegExp(string) {
            return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }


        function displayMatches() {
            if (!this.value) {
                suggestion.innerHTML = `
      <li>Filter for a city</li>
      <li>or a state</li>
    `;
                return;
            }

            const escapedValue = escapeRegExp(this.value);
            const regex = new RegExp(escapedValue, 'gi');

            const matchArray = findMatches(this.value, cities);

            const html = matchArray.map(place => {
                const cityName = place.city.replace(regex, `<span class="hl">$&</span>`);
                const stateName = place.state.replace(regex, `<span class="hl">$&</span>`);

                return `
      <li>
        <span class="name">${cityName}, ${stateName}</span>
        <span class="population">${numberWithCommas(place.population)}</span>
      </li>
    `;
            }).join('');

            suggestion.innerHTML = html;
        }

        

        searchInput.addEventListener('change', displayMatches);
        searchInput.addEventListener('keyup', displayMatches);
    </script>
</body>


</html>
